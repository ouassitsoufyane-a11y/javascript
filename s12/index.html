<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة حساب نقاط الطلاب</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 20px; color: #333; }
        .container { max-width: 800px; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: auto; }
        h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .form-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; display: flex; }
        .marks-section { border: 1px solid #eee; padding: 15px; border-radius: 8px; background: #fafafa; margin-bottom: 20px; }
        button { width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        #result { margin-top: 20px; padding: 20px; border-radius: 5px; display: none; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .fail { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        table { width: 100%; margin-top: 10px; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        tr:hover{background-color : rgb(212, 211, 211) ;}
        .btn-delete {background-color: red;width: 70px; color: white;}
        .btn-modif { background-color: green;  width: 100px;  color: white;
        
        }
    </style>
</head>
<body>

<div class="container">
    <h2>حساب نقاط الطالب</h2>
    
    <div class="form-group">
        <div>
            <label>الاسم الكامل:</label>
            <input type="text" id="fullName" placeholder="أدخل اسم الطالب">
        </div>
        <div>
            <label>ID الطالب (الرقم الرقمي):</label>
            <input type="text" id="studentID" placeholder="مثلاً: 2024001">
        </div>
        <div>
            <label>العمر:</label>
            <input type="number" id="age" placeholder="العمر">
        </div>
        <div>
            <label >..</label>
            <button onclick="remplir()">تحديت</button>
        </div>
    </div>

    
        
    

    <button id="btnresult" >اضافة طالب</button>
    <div class="result">
        <table class="table">
        <tr>
            <th>ID</th>
            <th>الاسم الكامل</th>
            <th>العمر</th>
            <th>المادة</th>
        </tr>
    </table>
    </div>
</div>


<script src="script.js"></script>
</body>
</html>
