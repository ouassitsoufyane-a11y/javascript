<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Gestion des produits</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
  <h2 class="text-center mb-4">Gestion des produits</h2>

  <div class="mb-3">
    <button class="btn btn-primary" onclick="showForm()">Ajouter</button>
    <button class="btn btn-danger" onclick="deleteProduct()">Supprimer</button>
    <button class="btn btn-info" onclick="loadCategories()">Afficher liste des catégories</button>
  </div>

  <div id="formContainer" class="card p-4 mb-4 shadow" >
    <h5>Ajouter Produit</h5>

    <input type="number" id="code" class="form-control mb-2" placeholder="Code">
    <input type="text" id="titre" class="form-control mb-2" placeholder="Titre">
    <input type="text" id="description" class="form-control mb-2" placeholder="Description">
    <input type="number" id="prix" class="form-control mb-2" placeholder="Prix">
    <input type="text" id="categorie" class="form-control mb-2" placeholder="Catégorie">

    <div>
      <button class="btn btn-success" onclick="addProduct()">Sauvegarder</button>
      <button class="btn btn-secondary" onclick="annuler()">Annuler</button>
      <button class="btn btn-warning" onclick="clearForm()">Vider</button>
    </div>
  </div>

  <table class="table table-bordered table-hover shadow">
    <thead class="table-dark">
      <tr style="background-color: black;">
        <th>Code</th>
        <th>Titre</th>
        <th>Description</th>
        <th>Prix</th>
        <th>Catégorie</th>
      </tr>
    </thead>
    <tbody id="productTable"></tbody>
  </table>

  <ul id="categoriesList" class="list-group mt-3"></ul>

</div>
<script src="script.js"></script>
</body>
</html>
