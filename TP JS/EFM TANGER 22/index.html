<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des notes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">Notes des Stagiaires</h2>

    <form class="card p-4 shadow">

        <div class="mb-3 d-flex gap-2">
            <div class="flex-grow-1">
                <label for="id" class="form-label">ID</label>
                <input type="number" id="id" class="form-control">
            </div>
            <div class="align-self-end">
                <button type="button" id="lire" class="btn btn-info" onclick="rechercher()">Lire</button>
            </div>
        </div>

        <div class="mb-3">
            <label for="nom" class="form-label">Nom</label>
            <input type="text" id="nom" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Filière</label><br>


            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="filiere" value="TTC">
                <label class="form-check-label">TTC</label>
            </div>

            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="filiere" value="TDI">
                <label class="form-check-label">TDI</label>
            </div>

            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="filiere" value="TPP">
                <label class="form-check-label">TPP</label>
            </div>
        </div>

        <div class="mb-3">
            <label for="note" class="form-label">Note</label>
            <input type="number" id="note" class="form-control">
        </div>

        <div class="text-center">
            <button type="button" id="ajouter" class="btn btn-success" onclick="ajouter(event)">
                Ajouter la note
            </button>
        </div>

    </form>

    <div class="mt-5">
        <table class="table table-bordered table-hover text-center">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nom</th>
                    <th>Filière</th>
                    <th>Note</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="tbody">
                <tr>
                    <td>123</td>
                    <td>Aoufian</td>
                    <td>TTC</td>
                    <td>12</td>
                    <td>
                        <button class="btn btn-danger btn-sm">Supprimer</button>
                    </td>
                </tr>
            </tbody>
            <tfoot class="table-success">
                <tr><td>the best note : <span id="bestnote"></span></td></tr>
            </tfoot>
        </table>
    </div>

</div>
<script src="script.js"></script>
</body>
</html>
