<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annonce vente voiture</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">Annonce vente voiture</h2>

        <form>

            <div class="mb-3">
                <label for="matricul" class="form-label">Matricule</label>
                <input type="text" class="form-control" id="matricul" name="matricul">
            </div>

            <div class="mb-3">
                <label for="marque" class="form-label">Marque</label>
                <input type="text" class="form-control" id="marque" name="marque">
            </div>

            <div class="mb-3">
                <label for="modele" class="form-label">Modèle</label>
                <input type="text" class="form-control" id="modele" name="modele">
            </div>

            <div class="mb-3">
                <label for="anneeProd" class="form-label">Année de production</label>
                <input type="number" class="form-control" id="anneeProd" name="anneeProd" min="1950" max="2026">
            </div>

            <div class="mb-3">
                <label for="carburant" class="form-label">Carburant</label>
                <input type="text" class="form-control" id="carburant" name="carburant">
            </div>

            <div class="mb-3">
                <label for="prix" class="form-label">Prix</label>
                <input type="number" class="form-control" id="prix" name="prix">
            </div>

            <div class="d-flex justify-content-between">
                <button type="button" class="btn btn-primary" id="cons">Consulter</button>
                <button type="submit" class="btn btn-success" id="eng">Enregistrer</button>
            </div>

        </form>

        <div id="affichage"></div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
